<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem</title>
    <link rel="stylesheet" href="../dist/output.css">
</head>
<body class="min-h-screen bg-black text-white font-sans m-0 p-0">
    <header class="flex flex-col gap-4 justify-evenly bg-black p-5 m-2.5 md:flex-row">
        <div class="text-center space-y-2">
            <p class="font-semibold">Nome Personagem</p>
            <input type="text" class="w-full rounded border border-slate-600 bg-stone-200 px-2 py-1 text-black">
            <p>Raça</p>
            <input type="text" class="w-full rounded border border-slate-600 bg-stone-200 px-2 py-1 text-black">
        </div>
        <div class="text-center space-y-2">
            <p class="font-semibold">Nome jogador</p>
            <input type="text" class="w-full rounded border border-slate-600 bg-stone-200 px-2 py-1 text-black">
            <p>Classe</p>
            <input type="text" class="w-full rounded border border-slate-600 bg-stone-200 px-2 py-1 text-black">
        </div>
        <div class="text-center space-y-2">
            <p class="font-semibold">Pontos de experiência</p>
            <input type="text" class="w-full rounded border border-slate-600 bg-stone-200 px-2 py-1 text-black">
            <p>Alinhamento</p>
            <input type="text" class="w-full rounded border border-slate-600 bg-stone-200 px-2 py-1 text-black">
        </div>
    </header>
    <main>
        <section class="flex flex-col gap-6 bg-black m-2.5 p-4 md:flex-row md:justify-evenly">
            <div class="text-center space-y-3">
                <div>
                    <p>FOR</p>
                    <input type="number" class="w-20 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                </div>
                <div>
                    <p>DES</p>
                    <input type="number" class="w-20 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                </div>
                <div>
                    <p>CON</p>
                    <input type="number" class="w-20 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                </div>
                <div>
                    <p>INT</p>
                    <input type="number" class="w-20 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                </div>
                <div>
                    <p>SAB</p>
                    <input type="number" class="w-20 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                </div>
                <div>
                    <p>CAR</p>
                    <input type="number" class="w-20 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                </div>
            </div>
            <div class="flex flex-col items-center gap-4">
                <div class="flex flex-wrap justify-evenly gap-4 w-full">
                    <div class="text-center m-2.5 space-y-2">
                        <p>Vida</p>
                        <input type="number" class="w-24 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                    </div>
                    <div class="text-center m-2.5 space-y-2">
                        <p>Defesa</p>
                        <input type="number" class="w-24 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                    </div>
                    <div class="text-center m-2.5 space-y-2">
                        <p>Velocidade</p>
                        <input type="number" class="w-24 rounded border border-slate-600 bg-slate-900 px-2 py-1">
                    </div>
                </div>
                <div class="text-center">
                    <img src="https://pbs.twimg.com/profile_images/1339311771325243392/m72v_IX0_400x400.jpg" alt="Personagem" class="mx-auto h-[370px] w-[350px] rounded object-cover">
                </div>
            </div>
            <div class="text-center space-y-4 w-full max-w-md">
                <h2 class="text-xl font-semibold">Biografia</h2>
                <textarea cols="30" rows="25" class="w-full rounded border border-slate-600 bg-slate-900 p-3 text-white"></textarea>
            </div>
        </section>
        <section class="bg-black p-5 m-2.5 text-center">
            <div class="flex flex-col gap-4 md:flex-row md:justify-evenly md:items-start m-2.5">
                <div class="w-full md:w-1/2 text-left space-y-2">
                    <h2 class="text-xl font-semibold">Biografia</h2>
                    <textarea cols="30" rows="10" class="w-full rounded border border-slate-600 bg-slate-900 p-3 text-white"></textarea>
                </div>
                <div class="w-full md:w-1/2 text-left space-y-2">
                    <h2 class="text-xl font-semibold">Características</h2>
                    <textarea cols="30" rows="10" class="w-full rounded border border-slate-600 bg-slate-900 p-3 text-white"></textarea>
                </div>
            </div>
            <div class="flex justify-center">
                <button class="bg-blue-600 hover:bg-blue-700 h-12 w-24 rounded text-white">ENVIAR</button>
            </div>
        </section>
    </main>
    <footer class="bg-black p-4 m-2.5 text-center">
        <p>Prof. João - Ctrl+Play</p>
    </footer>
</body>
</html>
